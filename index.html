  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

7a44;text-decoration:none}\na:hover{color:#00b358}\n::selection{background:#00ff7d;color:#161618}\ninput::placeholder{color:#a9abae}\n@keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(0,255,125,.5)}70%{box-shadow:0 0 0 12px rgba(0,255,125,0)}100%{box-shadow:0 0 0 0 rgba(0,255,125,0)}}\n@keyframes cueDrop{0%{transform:scaleY(0);transform-origin:top}45%{transform:scaleY(1);transform-origin:top}55%{transform:scaleY(1);transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}\n@media (max-width:1020px){[data-navlinks]{display:none !important}}\n@media (max-width:900px){[data-stagetext]{left:6vw !important;right:6vw !important;top:7vh !important;transform:none !important;width:auto !important}[data-stagecard]{top:60% !important;left:50% !important}[data-ucsvg]{display:none !important}}\n@media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<header ref=\"{{ navRef }}\" style=\"position:fixed;top:0;left:0;right:0;z-index:80;background:rgba(255,255,255,.8);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-bottom:1px solid rgba(20,20,22,.06);transition:box-shadow .3s\">\n  <div style=\"max-width:1280px;margin:0 auto;padding:0 32px;height:62px;display:flex;align-items:center;gap:28px\">\n    <div onclick=\"{{ goTop }}\" style=\"cursor:pointer;display:flex;align-items:center;flex:none\">\n      <img src=\"f32eceb4-5472-4908-b338-17447d2e67fd\" alt=\"Caldarium\" style=\"height:42px;margin-top:6px;display:block\">\n    <\u002Fdiv>\n    <nav data-navlinks=\"\" style=\"display:flex;align-items:center;gap:26px;margin-left:auto\">\n      <span onclick=\"{{ goStory }}\" style=\"cursor:pointer;white-space:nowrap;font:600 12.5px 'Jost',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:#5c5c60;transition:color .2s\" style-hover=\"color:#161618\">How It Works<\u002Fspan>\n      <span onclick=\"{{ goUseCases }}\" style=\"cursor:pointer;white-space:nowrap;font:600 12.5px 'Jost',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:#5c5c60;transition:color .2s\" style-hover=\"color:#161618\">Use Cases<\u002Fspan>\n      <span onclick=\"{{ goOutcomes }}\" style=\"cursor:pointer;white-space:nowrap;font:600 12.5px 'Jost',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:#5c5c60;transition:color .2s\" style-hover=\"color:#161618\">Outcomes<\u002Fspan>\n      <span onclick=\"{{ goFaq }}\" style=\"cursor:pointer;white-space:nowrap;font:600 12.5px 'Jost',sans-serif;letter-spacing:.12em;text-transform:uppercase;color:#5c5c60;transition:color .2s\" style-hover=\"color:#161618\">FAQ<\u002Fspan>\n    <\u002Fnav>\n    <button onclick=\"{{ goDiagnostic }}\" style=\"margin-left:0;flex:none;white-space:nowrap;background:#00ff7d;color:#161618;border:none;cursor:pointer;font:600 12px 'Jost',sans-serif;letter-spacing:.12em;text-transform:uppercase;padding:12px 20px;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);transition:background .2s,transform .2s\" style-hover=\"background:#00e671;transform:translateY(-1px)\">Request a Diagnostic<\u002Fbutton>\n  <\u002Fdiv>\n  <div ref=\"{{ progressRef }}\" style=\"position:absolute;left:0;bottom:-1px;height:2px;width:0%;background:#00ff7d\"><\u002Fdiv>\n<\u002Fheader>\n\n<section data-screen-label=\"Hero\" style=\"position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;background:radial-gradient(1200px 700px at 50% 118%,#dbffec 0%,rgba(219,255,236,0) 60%),#ffffff\">\n  <div data-fx=\"heroInner\" style=\"text-align:center;padding:120px 24px 80px;max-width:1000px;will-change:transform,opacity\">\n    <div style=\"display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:26px\">\n      <div style=\"width:74px;height:6px;background:#00ff7d;clip-path:polygon(0 45%,48% 45%,56% 0,100% 0,100% 100%,0 100%)\"><\u002Fdiv>\n      <span style=\"font:500 12px 'IBM Plex Mono',monospace;letter-spacing:.2em;text-transform:uppercase;color:#6f6f73\">Prior authorization, done right<\u002Fspan>\n    <\u002Fdiv>\n    <h1 style=\"margin:0 0 26px;font:600 clamp(52px,8vw,110px)/1.02 'Jost',sans-serif;letter-spacing:-.025em;color:#1d1d1f;text-wrap:balance\">Stop losing revenue to prior&nbsp;auth denials.<\u002Fh1>\n    <p style=\"margin:0 auto 40px;font-size:clamp(17px,1.6vw,21px);line-height:1.6;color:#5c5c60;max-width:640px;text-wrap:pretty\">Caldarium gets prior authorizations right the first time: flagged early, built complete from the chart, tracked to approval. Starting where the stakes are highest: <strong style=\"color:#1d1d1f\">infusion<\u002Fstrong>.<\u002Fp>\n    <div style=\"display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-bottom:64px\">\n      <button onclick=\"{{ goDiagnostic }}\" style=\"white-space:nowrap;background:#00ff7d;color:#161618;border:none;cursor:pointer;font:600 13.5px 'Jost',sans-serif;letter-spacing:.11em;text-transform:uppercase;padding:18px 32px;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,0 100%);transition:background .2s,transform .2s\" style-hover=\"background:#00e671;transform:translateY(-2px)\">Request a PA Diagnostic<\u002Fbutton>\n      <button onclick=\"{{ goStory }}\" style=\"white-space:nowrap;background:transparent;color:#414042;border:1px solid #bbbdbf;cursor:pointer;font:600 13.5px 'Jost',sans-serif;letter-spacing:.11em;text-transform:uppercase;padding:18px 32px;transition:border-color .2s,color .2s\" style-hover=\"border-color:#414042;color:#161618\">Watch it work<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"display:inline-flex;flex-direction:column;align-items:center;gap:10px\">\n      <span style=\"font:500 10.5px 'IBM Plex Mono',monospace;letter-spacing:.22em;color:#98999c\">SCROLL<\u002Fspan>\n      <div style=\"width:1px;height:44px;background:#bbbdbf;animation:cueDrop 1.9s ease-in-out infinite\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-fx=\"stmt\" data-screen-label=\"Problem Statement\" style=\"position:relative;height:220vh;background:#ffffff\">\n  <div style=\"position:sticky;top:0;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden\">\n    <div style=\"max-width:1060px;padding:0 32px;text-align:center\">\n      <p style=\"margin:0 0 34px;font:600 clamp(36px,5.4vw,76px)/1.14 'Jost',sans-serif;letter-spacing:-.02em;color:#1d1d1f;text-wrap:balance\"><span data-w=\"\" style=\"opacity:.1\">Most<\u002Fspan> <span data-w=\"\" style=\"opacity:.1\">prior<\u002Fspan> <span data-w=\"\" style=\"opacity:.1\">auth<\u002Fspan> <span data-w=\"\" style=\"opacity:.1\">denials<\u002Fspan> <span data-w=\"\" style=\"opacity:.1\">are<\u002Fspan> <span data-w=\"\" style=\"opacity:.1\">documentation<\u002Fspan> <span data-w=\"\" style=\"opacity:.1\">failures,<\u002Fspan> <span data-w=\"\" style=\"opacity:.1;color:#0a7a44\">not<\u002Fspan> <span data-w=\"\" style=\"opacity:.1;color:#0a7a44\">clinical<\u002Fspan> <span data-w=\"\" style=\"opacity:.1;color:#0a7a44\">ones.<\u002Fspan><\u002Fp>\n      <p data-fx=\"stsub\" style=\"margin:0 auto;max-width:620px;font-size:16.5px;line-height:1.7;color:#808184;opacity:0;text-wrap:pretty\">Care gets delayed or denied because the paperwork is incomplete, fragmented, or misaligned with what the payer requires, and most EHRs can't catch that before a request goes out.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"story\" data-fx=\"pin\" data-screen-label=\"How It Works Story\" style=\"position:relative;height:560vh;background:#ffffff\">\n  <div data-fx=\"stage\" style=\"position:sticky;top:0;height:100vh;overflow:hidden;background:#131315;will-change:transform;border-radius:36px\">\n    <div data-fx=\"glow\" style=\"position:absolute;left:79%;top:50%;width:760px;height:760px;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(0,255,125,.14) 0%,rgba(0,255,125,0) 68%);pointer-events:none\"><\u002Fdiv>\n\n    <div data-stagetext=\"\" data-cht=\"0\" style=\"position:absolute;left:6vw;top:50%;transform:translateY(-50%);width:min(340px,60vw);opacity:0;will-change:transform,opacity;text-shadow:0 2px 24px rgba(0,0,0,.6),0 1px 2px rgba(0,0,0,.8);z-index:5\">\n      <span style=\"font:500 12px 'IBM Plex Mono',monospace;letter-spacing:.2em;color:#00ff7d\">01 · CHECK<\u002Fspan>\n      <h2 style=\"margin:14px 0 16px;font:600 clamp(34px,4.4vw,58px)/1.06 'Jost',sans-serif;letter-spacing:-.02em;color:#f4f4f5;text-wrap:balance\">Know before the visit.<\u002Fh2>\n      <p style=\"margin:0;font-size:16.5px;line-height:1.65;color:#b7b8bb;text-wrap:pretty\">For each order, Caldarium checks the service, drug, payer, and plan, then flags the cases that require an authorization. Before the visit, not after the claim.<\u002Fp>\n    <\u002Fdiv>\n    <div data-stagetext=\"\" data-cht=\"1\" style=\"position:absolute;left:6vw;top:50%;transform:translateY(-50%);width:min(340px,60vw);opacity:0;will-change:transform,opacity;text-shadow:0 2px 24px rgba(0,0,0,.6),0 1px 2px rgba(0,0,0,.8);z-index:5\">\n      <span style=\"font:500 12px 'IBM Plex Mono',monospace;letter-spacing:.2em;color:#00ff7d\">02 · REVIEW<\u002Fspan>\n      <h2 style=\"margin:14px 0 16px;font:600 clamp(34px,4.4vw,58px)/1.06 'Jost',sans-serif;letter-spacing:-.02em;color:#f4f4f5;text-wrap:balance\">It reads the chart for&nbsp;you.<\u002Fh2>\n      <p style=\"margin:0;font-size:16.5px;line-height:1.65;color:#b7b8bb;text-wrap:pretty\">Notes, labs, and history: pulled from the chart and mapped, line by line, to the payer's medical-necessity criteria.<\u002Fp>\n    <\u002Fdiv>\n    <div data-stagetext=\"\" data-cht=\"2\" style=\"position:absolute;left:6vw;top:50%;transform:translateY(-50%);width:min(340px,60vw);opacity:0;will-change:transform,opacity;text-shadow:0 2px 24px rgba(0,0,0,.6),0 1px 2px rgba(0,0,0,.8);z-index:5\">\n      <span style=\"font:500 12px 'IBM Plex Mono',monospace;letter-spacing:.2em;color:#00ff7d\">03 · RESOLVE<\u002Fspan>\n      <h2 style=\"margin:14px 0 16px;font:600 clamp(34px,4.4vw,58px)/1.06 'Jost',sans-serif;letter-spacing:-.02em;color:#f4f4f5;text-wrap:balance\">Gaps surface before submission.<\u002Fh2>\n      <p style=\"margin:0;font-size:16.5px;line-height:1.65;color:#b7b8bb;text-wrap:pretty\">Anything missing is flagged while there's still time to fix it. Your staff resolve the gap in minutes, before the request, not the denial, goes out.<\u002Fp>\n    <\u002Fdiv>\n    <div data-stagetext=\"\" data-cht=\"3\" style=\"position:absolute;left:6vw;top:50%;transform:translateY(-50%);width:min(340px,60vw);opacity:0;will-change:transform,opacity;text-shadow:0 2px 24px rgba(0,0,0,.6),0 1px 2px rgba(0,0,0,.8);z-index:5\">\n      <span style=\"font:500 12px 'IBM Plex Mono',monospace;letter-spacing:.2em;color:#00ff7d\">04 · TRACK<\u002Fspan>\n      <h2 style=\"margin:14px 0 16px;font:600 clamp(34px,4.4vw,58px)/1.06 'Jost',sans-serif;letter-spacing:-.02em;color:#f4f4f5;text-wrap:balance\">Tracked to approval.<\u002Fh2>\n      <p style=\"margin:0;font-size:16.5px;line-height:1.65;color:#b7b8bb;text-wrap:pretty\">Every authorization in one view: submitted, in review, approved. Nothing slips past the service date. Nothing sits forgotten in a queue.<\u002Fp>\n    <\u002Fdiv>\n\n    <div data-fx=\"ghost0\" style=\"position:absolute;left:79%;top:50%;transform:translate(-50%,-50%) translate(-170px,-46px) rotate(-7deg) scale(.62);width:min(430px,88vw);opacity:0;will-change:opacity\">\n      <div style=\"background:#232326;border:1px solid #39393d;border-radius:18px;padding:22px 24px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:16px\"><div style=\"height:9px;width:46%;background:#45454a;border-radius:4px\"><\u002Fdiv><span style=\"font:600 10px 'IBM Plex Mono',monospace;color:#9a9b9e;border:1px solid #45454a;padding:4px 8px;border-radius:5px\">IN REVIEW<\u002Fspan><\u002Fdiv>\n        <div style=\"height:7px;width:82%;backg practice.<\u002Fp>\n      <div data-fx=\"dwrap\" style=\"position:relative;display:flex;flex-direction:column;gap:24px;max-width:520px\">\n        <svg viewBox=\"0 0 4 100\" preserveAspectRatio=\"none\" style=\"position:absolute;left:15px;top:40px;height:calc(100% - 80px);width:4px;pointer-events:none\"><path data-dline=\"\" d=\"M2 0 C 3.4 18, 0.6 38, 2 58 C 3 76, 1.4 90, 2 100\" pathLength=\"100\" fill=\"none\" stroke=\"#00ff7d\" stroke-width=\"2.4\" stroke-linecap=\"round\" vector-effect=\"non-scaling-stroke\" stroke-dasharray=\"100\" stroke-dashoffset=\"100\"><\u002Fpath><\u002Fsvg>\n        <div style=\"display:flex;gap:18px\"><span data-dstep=\"0\" style=\"position:relative;z-index:1;flex:none;width:34px;height:34px;background:#ffffff;border:1px solid #6dffb5;border-radius:10px;display:grid;place-items:center;font:600 13px 'IBM Plex Mono',monospace;color:#0a7a44;transition:background .35s,color .35s,border-color .35s;will-change:transform\">1<\u002Fspan><div><h3 style=\"margin:0 0 5px;font:600 17px 'Jost',sans-serif;color:#1d1d1f\">We review your workflow<\u002Fh3><p style=\"margin:0;font-size:14px;line-height:1.6;color:#5c5c60\">How authorizations are checked, assembled, submitted, and tracked today, including where your EHR falls short.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:18px\"><span data-dstep=\"1\" style=\"position:relative;z-index:1;flex:none;width:34px;height:34px;background:#ffffff;border:1px solid #6dffb5;border-radius:10px;display:grid;place-items:center;font:600 13px 'IBM Plex Mono',monospace;color:#0a7a44;transition:background .35s,color .35s,border-color .35s;will-change:transform\">2<\u002Fspan><div><h3 style=\"margin:0 0 5px;font:600 17px 'Jost',sans-serif;color:#1d1d1f\">We find the leakage<\u002Fh3><p style=\"margin:0;font-size:14px;line-height:1.6;color:#5c5c60\">Where denials, delays, and rework are costing you revenue and staff hours, quantified, not guessed.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div style=\"display:flex;gap:18px\"><span data-dstep=\"2\" style=\"position:relative;z-index:1;flex:none;width:34px;height:34px;background:#ffffff;border:1px solid #6dffb5;border-radius:10px;display:grid;place-items:center;font:600 13px 'IBM Plex Mono',monospace;color:#0a7a44;transition:background .35s,color .35s,border-color .35s;will-change:transform\">3<\u002Fspan><div><h3 style=\"margin:0 0 5px;font:600 17px 'Jost',sans-serif;color:#1d1d1f\">You get a written report<\u002Fh3><p style=\"margin:0;font-size:14px;line-height:1.6;color:#5c5c60\">A clear summary of findings and the highest-impact fixes, yours to keep, whether or not we work together.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"justify-self:center;width:min(460px,100%);position:relative\">\n      <svg viewBox=\"0 0 100 100\" preserveAspectRatio=\"none\" style=\"position:absolute;inset:-7px;width:calc(100% + 14px);height:calc(100% + 14px);pointer-events:none;overflow:visible;z-index:1\"><rect data-inkrect=\"\" x=\"0.5\" y=\"0.5\" width=\"99\" height=\"99\" rx=\"5.5\" ry=\"5.5\" pathLength=\"100\" fill=\"none\" stroke=\"#00ff7d\" stroke-width=\"2.4\" vector-effect=\"non-scaling-stroke\" stroke-dasharray=\"100\" stroke-dashoffset=\"100\"><\u002Frect><\u002Fsvg>\n      <div style=\"background:#ffffff;border:1px solid #d5f5e3;border-radius:24px;box-shadow:0 40px 90px -46px rgba(10,80,45,.4);padding:36px 34px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px\">\n          <h3 style=\"margin:0;font:600 22px 'Jost',sans-serif;color:#1d1d1f\">Book your Diagnostic<\u002Fh3>\n          <span style=\"flex:none;display:flex;align-items:center;gap:6px;font:600 10px 'IBM Plex Mono',monospace;letter-spacing:.08em;color:#0a7a44;background:#eafff4;border:1px solid #a9f5cd;border-radius:999px;padding:5px 10px\"><span style=\"width:6px;height:6px;border-radius:50%;background:#00ff7d\"><\u002Fspan>LIVE AVAILABILITY<\u002Fspan>\ 7c9;max-width:700px;text-wrap:pretty\">Caldarium prepares evidence that meets the bar today, and as standards evolve. Human-in-the-loop by design, with transparent, audit-ready outputs your team can review and verify.<\u002Fp>\n    <div data-fx=\"circwrap\" style=\"display:flex;align-items:center;gap:20px 40px;flex-wrap:wrap;margin:0 0 36px;padding:26px 30px;border:1px solid #2c2c2f;border-radius:18px;background:#1a1a1d;max-width:860px;box-sizing:border-box\">\n      <div style=\"flex:none\">\n        <span style=\"display:block;font:500 10.5px 'IBM Plex Mono',monospace;letter-spacing:.16em;color:#9a9b9e\">CMS-0057-F · COMPLIANCE DATE<\u002Fspan>\n        <div style=\"position:relative;display:inline-block;margin-top:8px\">\n          <span style=\"font:600 clamp(30px,3.2vw,44px)/1.1 'Jost',sans-serif;letter-spacing:-.01em;color:#f4f4f5;white-space:nowrap;padding:0 6px\">January 2027<\u002Fspan>\n          <svg viewBox=\"0 0 100 44\" preserveAspectRatio=\"none\" style=\"position:absolute;left:-6%;top:-16%;width:112%;height:132%;overflow:visible;pointer-events:none\"><path data-circ=\"\" d=\"M50 3 C 86 2, 99 11, 98 22 C 97 36, 72 43, 46 42 C 18 41, 2 33, 3 21 C 4 9, 26 3, 62 5\" pathLength=\"100\" fill=\"none\" stroke=\"#00ff7d\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-dasharray=\"100\" stroke-dashoffset=\"100\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"flex:1;min-width:260px;margin:0;font-size:14.5px;line-height:1.65;color:#c6c7c9;text-wrap:pretty\">The clock is already running: payers must have electronic prior-auth rails live by then. Complete, guideline-ready documentation is what makes those rails worth using.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;gap:12px\">\n      <span data-chipw=\"0\" style=\"display:flex;align-items:center;gap:9px;font:500 11.5px 'IBM Plex Mono',monospace;letter-spacing:.1em;color:#e8e9ea;border:1px solid #45454a;border-radius:9px;padding:9px 14px;will-ch 1Aria }}\" onclick=\"{{ faqGo1 }}\" style=\"border-bottom:1px solid #e3e4e6;cursor:pointer;padding:20px 4px;outline-offset:4px\">\n        <div style=\"display:flex;align-items:center;gap:14px\"><span style=\"flex:none;width:20px;height:20px;display:grid;place-items:center\"><svg viewBox=\"0 0 24 24\" style=\"width:19px;height:19px;overflow:visible\"><path d=\"M4 13 L10 19 L20 6\" pathLength=\"100\" fill=\"none\" stroke=\"#00ff7d\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-dasharray=\"100\" stroke-dashoffset=\"{{ q1Dash }}\" style=\"transition:stroke-dashoffset .55s cubic-bezier(.3,.8,.3,1) .15s\"><\u002Fpath><\u002Fsvg><\u002Fspan><h3 style=\"flex:1;margin:0;font:600 17px 'Jost',sans-serif;color:#1d1d1f\">Do you replace our staff or clinicians?<\u002Fh3><span style=\"flex:none;font:400 20px 'Jost',sans-serif;color:#98999c;transform:rotate({{ q1Rot }});transition:transform .3s\">+<\u002Fspan><\u002Fdiv>\n        <div style=\"display:grid;grid-template-rows:{{ q1Rows }};transition:grid-template-rows .4s cubic-bezier(.3,.8,.3,1)\"><div style=\"overflow:hidden\"><p style=\"margin:12px 0 4px;font-size:14.5px;line-height:1.68;color:#5c5c60;max-width:680px\">No. Caldarium prepares the work: <span style=\"background-image:linear-gradient(rgba(0,255,125,.32),rgba(0,255,125,.32));background-repeat:no-repeat;background-position:0 60%;background-size:{{ q1Hl }};transition:background-size .8s cubic-bezier(.3,.8,.3,1) .25s\">your staff review, approve, and submit every request.<\u002Fspan> Clinical judgment stays with your team, and nothing goes to a payer without a human sign-off.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div role=\"button\" tabindex=\"0\" aria-expanded=\"{{ q2Aria }}\" onclick=\"{{ faqGo2 }}\" style=\"border-bottom:1px solid #e3e4e6;cursor:pointer;padding:20px 4px;outline-offset:4px\">\n        <div style=\"display:flex;align-items:center;gap:14px\"><span style=\"flex:none;width:20px;height:20px;display:grid;place-items:center\"><svg viewBox=\"0 0 24 24\" style=\"width:19px;height:19px;overflow:visible\"><path d=\"M4 13 L10 19 L20 6\" pathLength=\"100\" fill=\"none\" stroke=\"#00ff7d\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-dasharray=\"100\" stroke-dashoffset=\"{{ q2Dash }}\" style=\"transition:stroke-dashoffset .55s cubic-bezier(.3,.8,.3,1) .15s\"><\u002Fpath><\u002Fsvg><\u002Fspan><h3 style=\"flex:1;margin:0;font:600 17px 'Jost',sans-serif;color:#1d1d1f\">Which authorizations does Caldarium handle?<\u002Fh3><span style=\"flex:none;font:400 20px 'Jost',sans-serif;color:#98999c;transform:rotate({{ q2Rot }});transition:transform .3s\">+<\u002Fspan><\u002Fdiv>\n        <div style=\"display:grid;grid-template-rows:{{ q2Rows }};transition:grid-template-rows .4s cubic-bezier(.3,.8,.3,1)\"><div style=\"overflow:hidden\"><p style=\"margin:12px 0 4px;font-size:14.5px;line-height:1.68;color:#5c5c60;max-width:680px\">We start with <span style=\"background-image:linear-gradient(rgba(0,255,125,.32),rgba(0,255,125,.32));background-repeat:no-repeat;background-position:0 60%;background-size:{{ q2Hl }};transition:background-size .8s cubic-bezier(.3,.8,.3,1) .25s\">infusion and specialty medications,<\u002Fspan> where documentation burden and denial cost are highest, then extend to imaging, high-value procedures, and surgical authorizations.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div role=\"button\" tabindex=\"0\" aria-expanded=\"{{ q3Aria }}\" onclick=\"{{ faqGo3 }}\" style=\"border-bottom:1px solid #e3e4e6;cursor:pointer;padding:20px 4px;outline-offset:4px\">\n        <div style=\"display:flex;align-items:center;gap:14px\"><span style=\"flex:none;width:20px;height:20px;display:grid;place-items:center\"><svg viewBox=\"0 0 24 24\" style=\"width:19px;height:19px;overflow:visible\"><path d=\"M4 13 L10 19 L20 6\" pathLength=\"100\" fill=\"none\" stroke=\"#00ff7d\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-dasharray=\"100\" stroke-dashoffset=\"{{ q3Dash }}\" style=\"transition:stroke-dashoffset .55s cubic-bezier(.3,.8,.3,1) .15s\"><\u002Fpath><\u002Fsvg><\u002Fspan><h3 style=\"flex:1;margin:0;font:600 17px 'Jost',sans-serif;color:#1d1d1f\">Will this work with our existing EHR?<\u002Fh3><span style=\"flex:none;font:400 20px 'Jost',sans-serif;color:#98999c;transform:rotate({{ q3Rot }});transition:transform .3s\">+<\u002Fspan><\u002Fdiv>\n        <div style=\"display:grid;grid-template-rows:{{ q3Rows }};transition:grid-template-rows .4s cubic-bezier(.3,.8,.3,1)\"><div style=\"overflow:hidden\"><p style=\"margin:12px 0 4px;font-size:14.5px;line-height:1.68;color:#5c5c60;max-width:680px\">Yes. Caldarium is a layer on top of the systems you already use, built specifically for practices whose EHR doesn't fully handle prior authorization. <span style=\"background-image:linear-gradient(rgba(0,255,125,.32),rgba(0,255,125,.32));background-repeat:no-repeat;background-position:0 60%;background-size:{{ q3Hl }};transition:background-size .8s cubic-bezier(.3,.8,.3,1) .25s\">No rip-and-replace, no migration.<\u002Fspan><\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div role=\"button\" tabindex=\"0\" aria-expanded=\"{{ q4Aria }}\" onclick=\"{{ faqGo4 }}\" style=\"border-bottom:1px solid #e3e4e6;cursor:pointer;padding:20px 4px;outline-offset:4px\">\n        <div style=\"display:flex;align-items:center;gap:14px\"><span style=\"flex:none;width:20px;height:20px;display:grid;place-items:center\"><svg viewBox=\"0 0 24 24\" style=\"width:19px;height:19px;overflow:visible\"><path d=\"M4 13 L10 19 L20 6\" pathLength=\"100\" fill=\"none\" stroke=\"#00ff7d\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-dasharray=\"100\" stroke-dashoffset=\"{{ q4Dash }}\" style=\"transition:stroke-dashoffset .55s cubic-bezier(.3,.8,.3,1) .15s\"><\u002Fpath><\u002Fsvg><\u002Fspan><h3 style=\"flex:1;margin:0;font:600 17px 'Jost',sans-serif;color:#1d1d1f\">What does the Prior Auth Diagnostic cost?<\u002Fh3><span style=\"flex:none;font:400 20px 'Jost',sans-serif;color:#98999c;transform:rotate({{ q4Rot }});transition:transform .3s\">+<\u002Fspan><\u002Fdiv>\n        <div style=\"display:grid;grid-template-rows:{{ q4Rows }};transition:grid-template-rows .4s cubic-bezier(.3,.8,.3,1)\"><div style=\"overflow:hidden\"><p style=\"margin:12px 0 4px;font-size:14.5px;line-height:1.68;color:#5c5c60;max-width:680px\"><span style=\"background-image:linear-gradient(rgba(0,255,125,.32),rgba(0,255,125,.32));background-repeat:no-repeat;background-position:0 60%;background-size:{{ q4Hl }};transition:background-size .8s cubic-bezier(.3,.8,.3,1) .25s\">Nothing, and it carries no obligation.<\u002Fspan> You get a written report of findings (where revenue is leaking and what to fix first) whether or not we work together.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div role=\"button\" tabindex=\"0\" aria-expanded=\"{{ q5Aria }}\" onclick=\"{{ faqGo5 }}\" style=\"border-bottom:1px solid #e3e4e6;cursor:pointer;padding:20px 4px;outline-offset:4px\">\n        <div style=\"display:flex;align-items:center;gap:14px\"><span style=\"flex:none;width:20px;height:20px;display:grid;place-items:center\"><svg viewBox=\"0 0 24 24\" style=\"width:19px;height:19px;overflow:visible\"><path d=\"M4 13 L10 19 L20 6\" pathLength=\"100\" fill=\"none\" stroke=\"#00ff7d\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-dasharray=\"100\" stroke-dashoffset=\"{{ q5Dash }}\" style=\"transition:stroke-dashoffset .55s cubic-bezier(.3,.8,.3,1) .15s\"><\u002Fpath><\u002Fsvg><\u002Fspan><h3 style=\"flex:1;margin:0;font:600 17px 'Jost',sans-serif;color:#1d1d1f\">How do you handle AI and trust?<\u002Fh3><span style=\"flex:none;font:400 20px 'Jost',sans-serif;color:#98999c;transform:rotate({{ q5Rot }});transition:transform .3s\">+<\u002Fspan><\u002Fdiv>\n        <div style=\"display:grid;grid-template-rows:{{ q5Rows }};transition:grid-template-rows .4s cubic-bezier(.3,.8,.3,1)\"><div style=\"overflow:hidden\"><p style=\"margin:12px 0 4px;font-size:14.5px;line-height:1.68;color:#5c5c60;max-width:680px\">Every output is transparent and reviewable: readiness checks link back to the exact chart evidence, and each request keeps an audit-ready record. <span style=\"background-image:linear-gradient(rgba(0,255,125,.32),rgba(0,255,125,.32));background-repeat:no-repeat;background-position:0 60%;background-size:{{ q5Hl }};transition:background-size .8s cubic-bezier(.3,.8,.3,1) .25s\">AI does the reading; people make the decisions.<\u002Fspan><\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div role=\"button\" tabindex=\"0\" aria-expanded=\"{{ q6Aria }}\" onclick=\"{{ faqGo6 }}\" style=\"border-bottom:1px solid #e3e4e6;cursor:pointer;padding:20px 4px;outline-offset:4px\">\n        <div style=\"display:flex;align-items:center;gap:14px\"><span style=\"flex:none;width:20px;height:20px;display:grid;place-items:center\"><svg viewBox=\"0 0 24 24\" style=\"width:19px;height:19px;overflow:visible\"><path d=\"M4 13 L10 19 L20 6\" pathLength=\"100\" fill=\"none\" stroke=\"#00ff7d\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-dasharray=\"100\" stroke-dashoffset=\"{{ q6Dash }}\" style=\"transition:stroke-dashoffset .55s cubic-bezier(.3,.8,.3,1) .15s\"><\u002Fpath><\u002Fsvg><\u002Fspan><h3 style=\"flex:1;margin:0;font:600 17px 'Jost',sans-serif;color:#1d1d1f\">Are you live in practices yet?<\u002Fh3><span style=\"flex:none;font:400 20px 'Jost',sans-serif;color:#98999c;transform:rotate({{ q6Rot }});transition:transform .3s\">+<\u002Fspan><\u002Fdiv>\n        <div style=\"display:grid;grid-template-rows:{{ q6Rows }};transition:grid-template-rows .4s cubic-bezier(.3,.8,.3,1)\"><div style=\"overflow:hidden\"><p style=\"margin:12px 0 4px;font-size:14.5px;line-height:1.68;color:#5c5c60;max-width:680px\">We're working with a small group of early partner practices, starting in GI infusion. If you'd like to be one of them, <span style=\"background-image:linear-gradient(rgba(0,255,125,.32),rgba(0,255,125,.32));background-repeat:no-repeat;background-position:0 60%;background-size:{{ q6Hl }};transition:background-size .8s cubic-bezier(.3,.8,.3,1) .25s\">the Diagnostic is the way in.<\u002Fspan><\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-screen-label=\"Final CTA\" style=\"background:#f7f7f8;border-top:1px solid #ececee\">\n  <div style=\"max-width:1280px;margin:0 auto;padding:130px 32px;text-align:center\">\n    <img src=\"915d8990-7b85-4595-9c83-810729dc6820\" alt=\"\" style=\"width:70px;margin:0 auto 28px;display:block\">\n    <h2 style=\"margin:0 auto 16px;font:600 clamp(36px,4.6vw,64px)/1.06 'Jost',sans-serif;letter-spacing:-.02em;color:#1d1d1f;max-width:760px;text-wrap:balance\">See where prior auth is costing you.<\u002Fh2>\n    <p style=\"margin:0 auto 40px;font-size:17px;line-height:1.65;color:#5c5c60;max-width:520px\">Start with a diagnostic, or grab 20 minutes with our founder.<\u002Fp>\n    <div style=\"display:flex;flex-wrap:wrap;gap:14px;justify-content:center\">\n      <button onclick=\"{{ goForm }}\" style=\"white-space:nowrap;background:#00ff7d;color:#161618;border:none;cursor:pointer;font:600 13.5px 'Jost',sans-serif;letter-spacing:.11em;text-transform:uppercase;padding:18px 32px;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,0 100%);transition:background .2s,transform .2s\" style-hover=\"background:#00e671;transform:translateY(-2px)\">Request a Diagnostic<\u002Fbutton>\n      <button onclick=\"{{ goDiagnostic }}\" style=\"white-space:nowrap;background:transparent;color:#414042;border:1px solid #bbbdbf;cursor:pointer;font:600 13.5px 'Jost',sans-serif;letter-spacing:.11em;text-transform:uppercase;padding:18px 32px;transition:border-color .2s,color .2s\" style-hover=\"border-color:#414042;color:#161618\">See what's included<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer data-screen-label=\"Footer\" style=\"background:#ffffff;border-top:1px solid #ececee\">\n  <div style=\"max-width:1280px;margin:0 auto;padding:38px 32px;display:flex;flex-wrap:wrap;align-items:center;gap:20px 36px\">\n    <img src=\"f32eceb4-5472-4908-b338-17447d2e67fd\" alt=\"Caldarium\" style=\"height:38px;margin-top:4px\">\n    <nav style=\"display:flex;flex-wrap:wrap;gap:22px;margin-left:auto\">\n      <span onclick=\"{{ goStory }}\" style=\"cursor:pointer;font:500 11.5px 'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:#808184;transition:color .2s\" style-hover=\"color:#1d1d1f\">How It Works<\u002Fspan>\n      <span onclick=\"{{ goUseCases }}\" style=\"cursor:pointer;font:500 11.5px 'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:#808184;transition:color .2s\" style-hover=\"color:#1d1d1f\">Use Cases<\u002Fspan>\n      <span onclick=\"{{ goDiagnostic }}\" style=\"cursor:pointer;font:500 11.5px 'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:#808184;transition:color .2s\" style-hover=\"color:#1d1d1f\">Diagnostic<\u002Fspan>\n      <span onclick=\"{{ goFaq }}\" style=\"cursor:pointer;font:500 11.5px 'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:#808184;transition:color .2s\" style-hover=\"color:#1d1d1f\">FAQ<\u002Fspan>\n    <\u002Fnav>\n    <span style=\"flex:none;font:400 11.5px 'IBM Plex Mono',monospace;color:#a5a7aa\">© 2026 Caldarium · Prior authorization, done right<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;motion&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Behavior&quot;, &quot;description&quot;: &quot;Master switch for all scroll choreography (prefers-reduced-motion always respected; off = clean static layout)&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { faq: 0, name: '', org: '', email: '', sent: false, err: '', selDay: null, selSlot: null, bookedSummary: '' };\n\n  constructor(props) {\n    super(props);\n    this.navRef = React.createRef();\n    this.progressRef = React.createRef();\n    this.nameRef = React.createRef();\n    this.days = this.computeDays();\n    this.slotHours = [9, 11, 13, 15];\n  }\n\n  computeDays() {\n    const days = [];\n    let d = new Date();\n    d.setHours(0, 0, 0, 0);\n    while (days.length < 5) {\n      d.setDate(d.getDate() + 1);\n      if (d.getDay() !== 0 && d.getDay() !== 6) days.push(new Date(d));\n    }\n    return days;\n  }\n\n  fmtHour(h) {\n    const period = h >= 12 ? 'PM' : 'AM';\n    let hh = h % 12; if (hh === 0) hh = 12;\n    return hh + ':00 ' + period;\n  }\n\n  motionOn() {\n    const pref = typeof matchMedia !== 'undefined' && matchMedia('(prefers-reduced-motion: reduce)').matches;\n    return (this.props.motion ?? true) && !pref;\n  }\n\n  downloadInvite(info, start, end) {\n    // Fully in-page booking, no redirect to any third-party scheduler: we\n    // build a standard .ics calendar file client-side and hand it straight\n    // to the browser as a download. Any calendar app (Google, Outlook,\n    // Apple) opens it as a normal invite.\n    const pad = (n) => String(n).padStart(2, '0');\n    const icsDate = (d) => d.getUTCFullYear() + pad(d.getUTCMonth() + 1) + pad(d.getUTCDate()) + 'T' + pad(d.getUTCHours()) + pad(d.getUTCMinutes()) + pad(d.getUTCSeconds()) + 'Z';\n    const esc = (s) => String(s || '').replace(/\\\\/g, '\\\\\\\\').replace(/\\n/g, '\\\\n').replace(/,/g, '\\\\,').replace(/;/g, '\\\\;');\n    const lines = [\n      'BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//Caldarium//Diagnostic//EN', 'CALSCALE:GREGORIAN',\n      'BEGIN:VEVENT',\n      'UID:' + Date.now() + '@caldarium.com',\n      'DTSTAMP:' + icsDate(new Date()),\n      'DTSTART:' + icsDate(start),\n      'DTEND:' + icsDate(end),\n      'SUMMARY:Caldarium Prior Auth Diagnostic (20 min)',\n      'DESCRIPTION:' + esc('Practice: ' + info.org + '\\nContact: ' + info.name + ' (' + info.email + ')'),\n      'ORGANIZER;CN=Caldarium:mailto:hemanthxox@gmail.com',\n      'ATTENDEE;CN=' + esc(info.name) + ':mailto:' + info.email,\n      'STATUS:CONFIRMED',\n      'END:VEVENT', 'END:VCALENDAR'\n    ];\n    const blob = new Blob([lines.join('\\r\\n')], { type: 'text/calendar' });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    a.href = url; a.download = 'caldarium-diagnostic.ics';\n    document.body.appendChild(a); a.click(); document.body.removeChild(a);\n    setTimeout(() => URL.revokeObjectURL(url), 4000);\n  }\n\n  goTo(id, focusName) {\n    const el = document.getElementById(id);\n    if (!el) return;\n    let top = el.getBoundingClientRect().top + window.scrollY - 66;\n    if (id === 'story') top += 10;\n    window.scrollTo({ top, behavior: this.motionOn() ? 'smooth' : 'auto' });\n    if (focusName) setTimeout(() => { if (this.nameRef.current) this.nameRef.current.focus({ preventScroll: true }); }, this.motionOn() ? 800 : 50);\n  }\n\n  renderVals() {\n    const v = {};\n    for (let i = 1; i <= 6; i++) {\n      const open = this.state.faq === i;\n      v['q' + i + 'Rows'] = open ? '1fr' : '0fr';\n      v['q' + i + 'Rot'] = open ? '45deg' : '0deg';\n      v['q' + i + 'Aria'] = open ? 'true' : 'false';\n      v['q' + i + 'Dash'] = open ? '0' : '100';\n      v['q' + i + 'Hl'] = open ? '100% 46%' : '0% 46%';\n      v['faqGo' + i] = () => this.setState({ faq: this.state.faq === i ? 0 : i });\n    }\n    v.navRef = this.navRef;\n    v.progressRef = this.progressRef;\n    v.goTop = () => window.scrollTo({ top: 0, behavior: this.motionOn() ? 'smooth' : 'auto' });\n    v.goStory = () => this.goTo('story');\n    v.goUseCases = () => this.goTo('usecases');\n    v.goOutcomes = () => this.goTo('outcomes');\n    v.goDiagnostic = () => this.goTo('diagnostic');\n
